# Pre-commit hooks. Install once with:
#   uv pip install pre-commit && pre-commit install && pre-commit install --hook-type pre-push
# Fast checks (lint, format, types) run on every commit; the full test suite +
# 100% coverage gate runs on push.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: ruff-format
        name: ruff (format)
        entry: ruff format
        language: system
        types: [python]
        require_serial: true
      - id: ruff
        name: ruff (lint)
        entry: ruff check --fix
        language: system
        types: [python]
        require_serial: true
      - id: mypy
        name: mypy (strict)
        entry: mypy
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
      - id: pytest
        name: pytest + 100% coverage
        entry: pytest --cov=markovlib
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
        require_serial: true
